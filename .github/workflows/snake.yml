name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate snake svg
        uses: Platane/snk@v3
        with:
          github_user_name: Lavi2605
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg

      # NEW modern deploy step (replaces deprecated action)
      - name: Push snake to repo
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Generate contribution snake"
          branch: main
